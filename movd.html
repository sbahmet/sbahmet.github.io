<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
</head>
<body>
v 8 <br>
<canvas class="c1" width="320" height="180"></canvas>
<br>
<canvas class="c3" width="320" height="180"></canvas>
<p></p>
<script>
    let canvas1 = document.querySelector('canvas.c1').getContext('bitmaprenderer');
    let canvas2 = document.querySelector('canvas.c2').getContext('bitmaprenderer');
    let output = document.querySelector('p');

    function log(s) {
        output.innerHTML += '<br>' + s;
    }

    function err(err) {
        log('Err: '+err);
    }

    async function start() {
        const mediaStream = await navigator.mediaDevices.getUserMedia({ video: {facingMode: 'environment' , width: 320, height: 180}});
        const imageCapture = new ImageCapture(mediaStream.getVideoTracks()[0]);

        function differ(bmp1, bmp2) {
            let cnt = 0;
            for(const i in bmp1) {
                if (Math.abs(bmp1[i] - bmp2[i]) > 10) {
                    cnt++;
                    if (cnt > 1000) {
                        return true;
                    }
                }
            }

            return false;
        }

        let newImgData = null;
        let oldImgData = null;

        setInterval(async () => {
            canvas1.transferFromImageBitmap(await imageCapture.grabFrame());
            newImgData = canvas1.getImageData(0, 0, 320, 180).data;

            if (oldImgData && differ(oldImgData, newImgData)) {
                log('differ');
            }
            oldImgData = newImgData;
        }, 3000);
    }

    try {
        start();
    } catch (e) {
        err(e);
    }

    let ctx = document.querySelector('canvas.c3').getContext('2d');

    ctx.fillStyle = "rgb(255 165 0)";
    ctx.strokeRect(2, 2, 10, 10);
    ctx.fillRect(0, 0, 2, 2);

    const myImageData = ctx.getImageData(0, 0, 320, 180);

    for (let i in myImageData.data) {
        if (myImageData.data[i] > 0) {
            log(i);
        }
    }

</script>
</body>
</html>
