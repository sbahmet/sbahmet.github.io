<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
</head>
<body>
<button>T</button>
<img/>
<p></p>
<script>
    let takePhotoButton = document.querySelector('button');
    let img = document.querySelector('img');
    let output = document.querySelector('p');

    function log(s) {
        output.innerHTML += '<br>' + s;
    }

    function err(err) {
        log('Err: '+err);
    }

    async function start() {
        const mediaStream = await navigator.mediaDevices.getUserMedia({ video: {facingMode: 'environment' , width: 320, height: 180}});
        const imageCapture = new ImageCapture(mediaStream.getVideoTracks()[0]);

        async function takePhoto() {
            return await imageCapture.grabFrame();
        }

        let imgBmp = null;

        //takePhotoButton.onclick = async () => img.src = URL.createObjectURL(await takePhoto());
        takePhotoButton.onclick = async () => {
            imgBmp = await takePhoto();

            log(imgBmp);
        };
    }

    try {
        start();
    } catch (e) {
        err(e);
    }

</script>
</body>
</html>
