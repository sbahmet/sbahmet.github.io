<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
</head>
<body>
v 13 <br>
<canvas class="c1" width="180" height="320"></canvas>
<input type="text" name="access_token" value="">
<button>Send</button>
<script>
    async function start() {
        let canvas1 = document.querySelector('canvas.c1').getContext('2d');
        const width = 180;
        const height = 320;

        const mediaStream = await navigator.mediaDevices.getUserMedia({ video: {facingMode: 'environment', width, height }});
        const imageCapture = new ImageCapture(mediaStream.getVideoTracks()[0]);

        function differ(bmp1, bmp2) {
            let cnt = 0;
            for(const i in bmp1) {
                if (Math.abs(bmp1[i] - bmp2[i]) > 10) {
                    cnt++;
                    if (cnt > 10000) {
                        return true;
                    }
                }
            }

            return false;
        }

        const ctx = new OffscreenCanvas(width, height).getContext('2d');

        let newImgData = null;
        let oldImgData = null;

        setInterval(async () => {
            const frame = await imageCapture.grabFrame();
            ctx.drawImage(frame, 0, 0);
            newImgData = ctx.getImageData(0, 0, frame.width, frame.height);

            if (oldImgData && differ(oldImgData.data, newImgData.data)) {
                canvas1.drawImage(await createImageBitmap(newImgData), 0, 0);
                // todo: imageBitmap.close();
                console.log('movement detected');
            }
            oldImgData = newImgData;
        }, 3000);
    }

    try {
        start();
    } catch (e) {
        console.error(e);
    }

    async function sendImage () {
        let canvas1 = document.querySelector('canvas.c1');
        let ctx = canvas1.getContext('2d');

        ctx.fillStyle = "rgb(200 200 0)";
        ctx.fillRect(10, 10, 50, 50);
        ctx.fillStyle = "rgb(0 0 200 / 50%)";
        ctx.fillRect(30, 30, 50, 50);

        // const img = canvas1.toDataURL('image/png');

        // console.log(img);

        const accessToken = document.querySelector('input').value;

        const corsHeaders = {
            'sec-fetch-mode': 'cors',
            'sec-fetch-site': 'cross-site',
            'Access-Control-Allow-Origin': '*',
            'Referrer-Policy': 'no-referrer',
        };

        const authHeaders = {
            Authorization: `Bearer ${accessToken}`,
        };

        const uploadParamsResponse = await fetch('https://api.pachca.com/api/shared/v1/uploads', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Access-Control-Allow-Origin': '*',
                ...authHeaders,
            },
        });

        const uploadParams = await uploadParamsResponse.json();

        console.log(uploadParams);

        if (! uploadParams.direct_url) {
            throw new Error('direct_url not defined');
        }

        const imageBlob = await new Promise(resolve => canvas1.toBlob(resolve, 'image/jpeg'));

        const formData = new FormData;
        formData.append('Content-Disposition', uploadParams['Content-Disposition']);
        formData.append('acl', 'private');
        formData.append('policy', uploadParams.policy);
        formData.append('x-amz-credential', uploadParams['x-amz-credential']);
        formData.append('x-amz-algorithm', uploadParams['x-amz-algorithm']);
        formData.append('x-amz-date', uploadParams['x-amz-date']);
        formData.append('x-amz-signature', uploadParams['x-amz-signature']);
        formData.append('key', uploadParams.key.replace('${filename}', 'movd.jpg'));
        formData.append('file', imageBlob, 'movd.jpg');

        await fetch(uploadParams.direct_url, {
            method: "POST",
            body: formData,
        });

        await fetch('https://api.pachca.com/api/shared/v1/messages', {
            method: 'POST',
            headers: {
                ...authHeaders,
                ...corsHeaders,
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                message: {
                    entity_type: "discussion",
                    entity_id: 38268730,
                    content: "mov-d",
                    files: [
                        {
                            key: uploadParams.key.replace('${filename}', 'movd.jpg'),
                            name: "movd.jpg",
                            file_type: "image",
                            size: imageBlob.size,
                            width: 180,
                            height: 320
                        }
                    ],
                    // "display_avatar_url": "https://example.com/avatar.png",
                    display_name: "movd-bot",
                    skip_invite_mentions: false,
                },
                link_preview: false
            }),
        });
    }

    document.querySelector('button').addEventListener('click', e => {
        sendImage();
    });
</script>
</body>
</html>
