<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
</head>
<body>
v 7 <br>
<canvas class="c1" width="320" height="180"></canvas>
<br>
<canvas class="c2" width="320" height="180"></canvas>
<p></p>
<script>
    let canvas1 = document.querySelector('canvas.c1').getContext("bitmaprenderer");
    let canvas2 = document.querySelector('canvas.c2').getContext("bitmaprenderer");
    let output = document.querySelector('p');

    function log(s) {
        output.innerHTML += '<br>' + s;
    }

    function err(err) {
        log('Err: '+err);
    }

    async function start() {
        const mediaStream = await navigator.mediaDevices.getUserMedia({ video: {facingMode: 'environment' , width: 320, height: 180}});
        const imageCapture = new ImageCapture(mediaStream.getVideoTracks()[0]);

        let oldImgBmp = null;
        let newImgBmp = null;

        function differ(bmp1, bmp2) {
            canvas1.transferFromImageBitmap(bmp1);
            canvas2.transferFromImageBitmap(bmp2);

            const d1 = canvas1.createImageData(320, 180);
            const d2 = canvas2.createImageData(320, 180);

            for(const i in d1.data) {
                if (Math.abs(d1[i] - d2[i]) > 10) {
                    return true;
                }
            }

            return false;
        }

        setInterval(async () => {
            newImgBmp = await imageCapture.grabFrame();
            if (oldImgBmp && differ(newImgBmp, oldImgBmp)) {
                log('differ');
            }
            oldImgBmp = newImgBmp;
        }, 3000);
    }

    try {
        start();
    } catch (e) {
        err(e);
    }

    let ctx = document.querySelector('canvas').getContext('2d');

    ctx.fillStyle = "rgb(255 165 0)";
    ctx.strokeRect(2, 2, 10, 10);
    ctx.fillRect(0, 0, 2, 2);

    const myImageData = ctx.createImageData(320, 180);

    for (let i in myImageData.data) {
        if (myImageData.data[i] > 0) {
            log(i);
        }
    }

    myImageData.data[115000] = 127;
    myImageData.data[115001] = 127;
    myImageData.data[115002] = 127;
    myImageData.data[115003] = 127;

    log(myImageData.data.length);

</script>
</body>
</html>
